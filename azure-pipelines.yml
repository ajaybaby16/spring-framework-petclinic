trigger:
- main

variables:
  azureSubscription: 'c5aa5ed7-8aa3-4355-a29e-e00d371418c0'
  webAppName: 'java-app-petclinic'
  resourceGroupName: 'RG-DT4-devops-dt4-1'
  environmentName: 'java-app-petclinic'
  vmImageName: 'ubuntu-latest'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  displayName: Build stage
  jobs:
  - job: MavenBuild
    displayName: Maven Package and Publish Artifacts
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: Maven@4
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'clean package'

    - task: CopyFiles@2
      displayName: 'Copy JAR to staging'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: '**/target/*.jar'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployWebApp
    displayName: Deploy to Azure Web App (Linux)
    environment: $(environmentName)
    pool:
      vmImage: $(vmImageName)

    strategy:
      runOnce:
        deploy:
          steps:

          # Deploy JAR
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/**/*.jar'

          # Set Startup Command
          - task: AzureCLI@2
            displayName: 'Configure Startup Command'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp config set \
                  --resource-group $(resourceGroupName) \
                  --name $(webAppName) \
                  --startup-file "java -jar /home/site/wwwroot/*.jar"

          # Increase Container Startup Timeout
          - task: AzureCLI@2
            displayName: 'Increase Startup Timeout'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp config set \
                  --resource-group $(resourceGroupName) \
                  --name $(webAppName) \
                  --generic-configurations '{"containerStartTimeLimit": 600}'

          # Restart App (ensures config applied)
          - task: AzureCLI@2
            displayName: 'Restart Web App'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp restart \
                  --name $(webAppName) \
                  --resource-group $(resourceGroupName)